{% extends "layout.html" %}

{% block title %}Error · ProcrastiNation{% endblock %}
{% block page_title %}Error{% endblock %}
{% block page_subtitle %}Something didn’t go as planned.{% endblock %}

{% block content %}
	<section class="panel" style="max-width: 720px; margin: 0 auto;">
		<div class="panel-header">
			<div>
				<div class="panel-title">Something went wrong</div>
				<div class="help">{{ top }}</div>
			</div>
		</div>
		<div class="panel-body">
			<div class="muted">{{ bottom }}</div>
			<div class="divider" style="margin: 18px 0;"></div>
			<div class="d-flex gap-2">
				<a class="btnx" href="/">Go home</a>
				<a class="btnx btnx-primary" href="/analytics">Analytics</a>
			</div>
		</div>
	</section>
{% endblock %}
