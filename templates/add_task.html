{% extends "layout.html" %}

{% block title %}Add task · ProcrastiNation{% endblock %}

{% block content %}
	<div class="row">
		<div class="col-lg-8 col-xl-6 mx-auto">
			<div class="card">
				<div class="card-header">Add a task</div>
				<div class="card-body">
					<form method="post" action="/add_task">
						<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

						<div class="mb-3">
							<label class="form-label">Title</label>
							<input class="form-control" name="title" placeholder="e.g., Finish project report" required>
						</div>

						<div class="mb-3">
							<label class="form-label">Description (optional)</label>
							<textarea class="form-control" name="description" rows="3" placeholder="Why it matters, what done looks like..."></textarea>
						</div>

						<div class="row g-3">
							<div class="col-md-6">
								<label class="form-label">Estimated time (minutes)</label>
								<input class="form-control" type="number" name="estimated_time" min="1" placeholder="e.g., 45">
							</div>
							<div class="col-md-6">
								<label class="form-label">Importance</label>
								<select class="form-select" name="importance" required>
									<option value="" selected disabled>Choose…</option>
									<option value="1">1 (low)</option>
									<option value="2">2</option>
									<option value="3">3</option>
									<option value="4">4</option>
									<option value="5">5 (high)</option>
								</select>
							</div>
						</div>

						<div class="mb-3 mt-3">
							<label class="form-label">Deadline (optional)</label>
							<input class="form-control" type="datetime-local" name="deadline">
						</div>

						<div class="d-flex justify-content-between">
							<a class="btn btn-outline-primary" href="/">Cancel</a>
							<button class="btn btn-primary" type="submit">Add task</button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
{% endblock %}
