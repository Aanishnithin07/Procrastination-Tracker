{% extends "layout.html" %}

{% block title %}Register · ProcrastiNation{% endblock %}

{% block content %}
	<div class="row">
		<div class="col-lg-6 col-xl-5 mx-auto">
			<div class="card">
				<div class="card-header">Create account</div>
				<div class="card-body">
					<form method="post" action="/register">
						<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

						<div class="mb-3">
							<label class="form-label">Username</label>
							<input class="form-control" name="username" autocomplete="username" required>
						</div>
						<div class="mb-3">
							<label class="form-label">Password</label>
							<input class="form-control" type="password" name="password" autocomplete="new-password" required>
						</div>
						<div class="mb-3">
							<label class="form-label">Confirm password</label>
							<input class="form-control" type="password" name="confirmation" autocomplete="new-password" required>
						</div>
						<button class="btn btn-primary w-100" type="submit">Register</button>
					</form>

					<div class="text-muted mt-3">
						Already have an account? <a href="/login">Login</a>
					</div>
				</div>
			</div>
		</div>
	</div>
{% endblock %}
