{% extends "layout.html" %}

{% block title %}Login · ProcrastiNation{% endblock %}
{% block page_title %}Login{% endblock %}
{% block page_subtitle %}Welcome back.{% endblock %}

{% block content %}
	<section class="panel" style="max-width: 520px; margin: 0 auto;">
		<div class="panel-header">
			<div>
				<div class="panel-title">Sign in</div>
				<div class="help">Pick up where you left off.</div>
			</div>
		</div>
		<div class="panel-body">
			<form method="post" action="{{ url_for('login', next=request.args.get('next')) }}" class="stack">
				<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

				<div class="field">
					<div class="label">Username</div>
					<input class="input" name="username" autocomplete="username" required>
				</div>

				<div class="field">
					<div class="label">Password</div>
					<input class="input" type="password" name="password" autocomplete="current-password" required>
				</div>

				<button class="btnx btnx-primary" type="submit">Login</button>
				<div class="help">New here? <a href="/register" style="color: var(--accent);">Create an account</a></div>
			</form>
		</div>
	</section>
{% endblock %}
